<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visual Product Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #222; }
    header { background: #1a1a2e; color: #fff; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header span { font-size: 0.85rem; opacity: 0.7; }
    .container { max-width: 1280px; margin: 0 auto; padding: 1.5rem 1rem; }
    .search-bar { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
    .search-bar input[type="text"] { flex: 1; min-width: 200px; padding: 0.6rem 1rem; border: 1px solid #ccc; border-radius: 6px; font-size: 0.95rem; }
    .search-bar button { padding: 0.6rem 1.2rem; background: #1a1a2e; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    .search-bar button:hover { background: #16213e; }
    .upload-zone { border: 2px dashed #aaa; border-radius: 8px; padding: 1.2rem; text-align: center; cursor: pointer; background: #fff; transition: border-color 0.2s; font-size: 0.9rem; color: #666; min-width: 220px; }
    .upload-zone.drag { border-color: #1a1a2e; }
    #fileInput { display: none; }
    .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.2rem; }
    .filter-btn { padding: 0.35rem 0.9rem; border: 1px solid #ccc; border-radius: 20px; background: #fff; cursor: pointer; font-size: 0.85rem; }
    .filter-btn.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
    .card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); transition: transform 0.15s; }
    .card:hover { transform: translateY(-3px); }
    .card img { width: 100%; height: 180px; object-fit: cover; }
    .card-body { padding: 0.75rem; }
    .card-title { font-size: 0.88rem; font-weight: 600; margin-bottom: 0.3rem; line-height: 1.3; }
    .card-cat { font-size: 0.75rem; color: #888; text-transform: capitalize; }
    .card-price { font-size: 1rem; font-weight: 700; color: #1a1a2e; margin-top: 0.4rem; }
    .score-badge { display: inline-block; background: #e0f7e9; color: #1a7a3a; font-size: 0.75rem; padding: 0.15rem 0.5rem; border-radius: 10px; margin-bottom: 0.4rem; }
    .pagination { display: flex; justify-content: center; gap: 0.5rem; margin-top: 1.5rem; }
    .pagination button { padding: 0.4rem 0.9rem; border: 1px solid #ccc; background: #fff; border-radius: 5px; cursor: pointer; }
    .pagination button.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
    #status { text-align: center; padding: 2rem; color: #888; font-size: 0.95rem; }
    .results-header { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    #backBtn { display: none; background: none; border: none; color: #1a1a2e; cursor: pointer; font-size: 0.9rem; text-decoration: underline; margin-bottom: 0.75rem; }
  </style>
</head>
<body>
  <header>
    <h1>Visual Product Search</h1>
    <span>Upload a photo or type to find similar products</span>
  </header>

  <div class="container">
    <div class="search-bar">
      <input type="text" id="textQuery" placeholder="Search: wireless headphones, red shoes…" />
      <button onclick="doTextSearch()">Search</button>
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        📷 Upload image to search
        <input type="file" id="fileInput" accept="image/*" onchange="doImageSearch(this)" />
      </div>
    </div>

    <button id="backBtn" onclick="resetToGrid()">← Back to all products</button>

    <div class="filters" id="filters">
      <button class="filter-btn active" onclick="setCategory(null, this)">All</button>
      {% for cat in categories %}
      <button class="filter-btn" onclick="setCategory('{{ cat }}', this)">{{ cat }}</button>
      {% endfor %}
    </div>

    <div id="status"></div>
    <div id="resultsHeader" class="results-header" style="display:none"></div>
    <div class="grid" id="grid"></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <script>
    let currentCategory = null;
    let currentPage = 1;
    const limit = 20;

    async function loadProducts() {
      setStatus('Loading products…');
      const params = new URLSearchParams({ page: currentPage, limit });
      if (currentCategory) params.set('category', currentCategory);
      const res = await fetch('/api/products?' + params);
      const data = await res.json();
      renderGrid(data.products);
      renderPagination(data.total, data.page);
      setStatus('');
    }

    function renderGrid(products, showScore = false) {
      const grid = document.getElementById('grid');
      if (!products.length) { grid.innerHTML = ''; setStatus('No results found.'); return; }
      grid.innerHTML = products.map(p => `
        <div class="card">
          <img src="${p.thumbnail || p.product?.thumbnail}" alt="${p.title || p.product?.title}" loading="lazy" onerror="this.src='https://placehold.co/200x180?text=No+Image'" />
          <div class="card-body">
            ${p.score !== undefined ? `<div class="score-badge">Match ${Math.round(p.score * 100)}%</div>` : ''}
            <div class="card-title">${p.title || p.product?.title}</div>
            <div class="card-cat">${p.category || p.product?.category}</div>
            <div class="card-price">$${(p.price || p.product?.price)?.toFixed(2)}</div>
          </div>
        </div>
      `).join('');
    }

    function renderSearchResults(results) {
      const products = results.map(r => ({...r.product, score: r.score}));
      renderGrid(products, true);
    }

    function renderPagination(total, page) {
      const pages = Math.ceil(total / limit);
      const el = document.getElementById('pagination');
      if (pages <= 1) { el.innerHTML = ''; return; }
      el.innerHTML = Array.from({length: Math.min(pages, 10)}, (_, i) => i + 1)
        .map(p => `<button class="${p === page ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`)
        .join('');
    }

    function goPage(p) { currentPage = p; loadProducts(); }

    function setCategory(cat, btn) {
      currentCategory = cat;
      currentPage = 1;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      showFilters(true);
      document.getElementById('backBtn').style.display = 'none';
      document.getElementById('resultsHeader').style.display = 'none';
      loadProducts();
    }

    async function doTextSearch() {
      const q = document.getElementById('textQuery').value.trim();
      if (!q) return;
      setStatus('Searching…');
      showFilters(false);
      const res = await fetch('/api/search/text?q=' + encodeURIComponent(q));
      if (!res.ok) { setStatus('Search index not ready yet.'); return; }
      const data = await res.json();
      setStatus('');
      showResultsHeader(`Text search: "${q}" — ${data.results.length} results`);
      renderSearchResults(data.results);
      document.getElementById('pagination').innerHTML = '';
    }

    async function doImageSearch(input) {
      const file = input.files[0];
      if (!file) return;
      const form = new FormData();
      form.append('file', file);
      setStatus('Analyzing image…');
      showFilters(false);
      const res = await fetch('/api/search/image', { method: 'POST', body: form });
      if (!res.ok) { setStatus('Search index not ready yet. Run the indexing script first.'); return; }
      const data = await res.json();
      setStatus('');
      showResultsHeader(`Image search — ${data.results.length} visually similar products`);
      renderSearchResults(data.results);
      document.getElementById('pagination').innerHTML = '';
      input.value = '';
    }

    function showResultsHeader(text) {
      const h = document.getElementById('resultsHeader');
      h.textContent = text;
      h.style.display = 'block';
      document.getElementById('backBtn').style.display = 'inline';
    }

    function showFilters(show) {
      document.getElementById('filters').style.display = show ? 'flex' : 'none';
    }

    function resetToGrid() {
      document.getElementById('textQuery').value = '';
      document.getElementById('backBtn').style.display = 'none';
      document.getElementById('resultsHeader').style.display = 'none';
      showFilters(true);
      currentPage = 1;
      currentCategory = null;
      document.querySelectorAll('.filter-btn').forEach((b, i) => b.classList.toggle('active', i === 0));
      loadProducts();
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    // drag and drop
    const zone = document.getElementById('uploadZone');
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('drag');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        const dt = new DataTransfer(); dt.items.add(file);
        const inp = document.getElementById('fileInput');
        inp.files = dt.files;
        doImageSearch(inp);
      }
    });

    document.getElementById('textQuery').addEventListener('keydown', e => { if (e.key === 'Enter') doTextSearch(); });

    loadProducts();
  </script>
</body>
</html>
